<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Brautomat Telegraf Wrapper</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <h1>Brautomat &rarr; Telegraf</h1>

  <section class="panel">
    <h2>Gerät</h2>
    <label>Geräte-URL
      <input id="deviceUrl" type="text" placeholder="http://brautomat.local" />
    </label>
    <label>Abrufintervall
      <input id="interval" type="text" placeholder="30s" />
    </label>
  </section>

  <section class="panel targets">
    <h2>Ziele (wahlweise aktivierbar)</h2>

    <fieldset>
      <legend><label><input type="checkbox" id="csvEnabled" /> CSV-Datei</label></legend>
      <label>Pfad <input id="csvPath" type="text" placeholder="brautomat.csv" /></label>
    </fieldset>

    <fieldset>
      <legend><label><input type="checkbox" id="influxEnabled" /> InfluxDB v2</label></legend>
      <label>URL <input id="influxUrl" type="text" placeholder="http://localhost:8086" /></label>
      <label>Token <input id="influxToken" type="password" /></label>
      <label>Organisation <input id="influxOrg" type="text" /></label>
      <label>Bucket <input id="influxBucket" type="text" /></label>
    </fieldset>

    <fieldset>
      <legend><label><input type="checkbox" id="pgEnabled" /> PostgreSQL</label></legend>
      <label>Host <input id="pgHost" type="text" /></label>
      <label>Port <input id="pgPort" type="text" placeholder="5432" /></label>
      <label>Datenbank <input id="pgDatabase" type="text" /></label>
      <label>Benutzer <input id="pgUser" type="text" /></label>
      <label>Passwort <input id="pgPassword" type="password" /></label>
    </fieldset>

    <fieldset>
      <legend><label><input type="checkbox" id="myEnabled" /> MariaDB / MySQL</label></legend>
      <label>Host <input id="myHost" type="text" /></label>
      <label>Port <input id="myPort" type="text" placeholder="3306" /></label>
      <label>Datenbank <input id="myDatabase" type="text" /></label>
      <label>Benutzer <input id="myUser" type="text" /></label>
      <label>Passwort <input id="myPassword" type="password" /></label>
    </fieldset>
  </section>

  <section class="panel controls">
    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>
    <span id="status">gestoppt</span>
  </section>

  <section class="panel">
    <h2>Ausgabe</h2>
    <pre id="log"></pre>
  </section>

  <script src="./src/main.js" type="module"></script>
</body>
</html>
