# Release-Pipeline für Woodpecker CI.
#
# Läuft nur bei Tags (event: tag) auf dem Branch `main`. Der Tag-Name ist
# die Versionsnummer # der Release (${CI_COMMIT_TAG}).
# Baut die App für Linux amd64 und Windows amd64. Baut ein Archiv und lädt dieses
# als Release- Asset auf git.mainz.ws (Forgejo) hoch - über den offiziellen
# woodpeckerci/plugin-release (unterstützt Gitea/Forgejo/GitHub).
#
# Ein Cross-Compiling für Darwin wird von wails v2 nicht unterstützt, deshalb
# wird hier exlizit darauf verzichtet, bis diese Möglichkeit besteht. Es steht
# außer dem Linux Docker Agent keine Build-Umgebung für woodpecker. Die wird
# für alle Zielumgebungen verwendet.
#
# Voraussetzungen:
#
#   - Ein Woodpecker-Secret mit einem Forgejo-Access-Token, das
#     Release-Assets auf git.mainz.ws anlegen darf (Scope mindestens
#     write:repository + read:misc). Der Name des Secrets ist unten als
#     "forgejo_token" angenommen - falls ihr einen anderen Namen
#     verwendet, einfach in den from_secret-Zeilen anpassen.
#   - base-url wird bewusst NICHT gesetzt, da der Plugin-Default
#     (CI_FORGE_URL) bereits auf eure Forgejo-Instanz zeigt, mit der
#     dieser Woodpecker-Server verbunden ist. Falls das in eurem Setup
#     nicht zutrifft, könnt ihr `base-url: https://git.mainz.ws` in den
#     jeweiligen publish-Schritten ergänzen.
#

when:
  - event: tag
    branch: main

steps:

  build:
    image: golang:1.25-bookworm
    commands:
      - apt-get update
      - apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.0-dev curl zip unzip
      - go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - go mod tidy

      ##############
      # Linux/amd64
      - wails build -platform linux/amd64 -clean

      # App-Binary + README.md in einen Ordner packen und
      # als tar.gz archivieren.
      - mkdir -p                            dist/linux_amd64/brautomat-telegraf-gui_${CI_COMMIT_TAG}
      - cp build/bin/brautomat-telegraf-gui dist/linux_amd64/brautomat-telegraf-gui_${CI_COMMIT_TAG}/
      - cp README.md                        dist/linux_amd64/brautomat-telegraf-gui_${CI_COMMIT_TAG}/ || true
      - tar -czf dist/brautomat-telegraf-gui_${CI_COMMIT_TAG}_linux_amd64.tar.gz -C dist/linux_amd64 brautomat-telegraf-gui_${CI_COMMIT_TAG}

      ##############
      # Windows/amd64
      - wails build -platform windows/amd64 -clean -windowsconsole

      # App-Binary + README.md in einen Ordner packen und als zip archivieren.
      - mkdir -p                                dist/windows_amd64/brautomat-telegraf-gui_${CI_COMMIT_TAG}
      - cp build/bin/brautomat-telegraf-gui.exe dist/windows_amd64/brautomat-telegraf-gui_${CI_COMMIT_TAG}/
      - cp README.md                            dist/windows_amd64/brautomat-telegraf-gui_${CI_COMMIT_TAG}/ || true
      - cd                                      dist/windows_amd64
      - zip -r ../../dist/brautomat-telegraf-gui_${CI_COMMIT_TAG}_windows_amd64.zip .
      - cd ../..

  publish:
    image: woodpeckerci/plugin-release
    settings:
      files:
        - dist/brautomat-telegraf-gui_*_linux_amd64.tar.gz
        - dist/brautomat-telegraf-gui_*_windows_amd64.zip
      api_key:
        from_secret: forgejo_token
      title: "Brautomat Telegraf Wrapper ${CI_COMMIT_TAG}"
