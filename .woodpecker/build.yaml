# Build-Pipeline für Woodpecker CI.
#
# Läuft bei jedem Push und prüft, dass sich die App für die zwei
# Zielplattformen Linux amd und WIndows amd bauen lässt. Ein
# Cross-Compiling für macOS/darwin ist nicht möglich, deshalb wird das
# noch nicht umgesetzt, bis wails diese Möglichkeit bietet.
#
# Es wird bewusst KEIN telegraf heruntergeladen und es werden keine
# Artefakte irgendwohin hochgeladen - reine "baut es noch?"-Prüfung.
# Für echte, veröffentlichte Binaries inkl. telegraf siehe release.yaml.

when:
  - event: push

steps:
  build:
    image: golang:1.25-bookworm
    environment:
      TELEGRAF_VERSION: "1.39.1"
      CI_COMMIT_TAG: "dev"
    commands:
      # GTK/WebKitGTK-Entwicklungspakete für den Wails-Linux-Webview-Backend.
      - apt-get update
      - apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.0-dev
      - go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - go mod tidy
      - wails build -platform linux/amd64 -clean
      - wails build -platform windows/amd64 -windowsconsole
      # Cross Compiling vor Darwin is not supported in wails v2
      # - wails build -platform darwin/universal
      #
      # Reine Zusatzprüfung: der Mock-Server ist reines Go ohne cgo und
      # lässt sich daher problemlos von hier aus für alle drei
      # Zielplattformen cross-kompilieren - kostet fast nichts und
      # deckt tools/mock-server mit ab.
      - GOOS=linux   GOARCH=amd64 go build -o /tmp/mock-server-linux   ./tools/mock-server
      - GOOS=windows GOARCH=amd64 go build -o /tmp/mock-server-win.exe ./tools/mock-server
      - GOOS=darwin  GOARCH=amd64 go build -o /tmp/mock-server-darwin ./tools/mock-server

      #######################
      # Test code do not forget to remove
      #######################

      # telegraf für Linux amd64 herunterladen und nur die Binary
      # herausziehen (Layout innerhalb des Archivs kann sich zwischen
      # Versionen leicht unterscheiden, daher robust per "find" statt
      # eines fest angenommenen Pfads).
      - apt-get install -y --no-install-recommends zip unzip
      - mkdir -p /tmp/telegraf-extract
      - curl -fsSL -o /tmp/telegraf.tar.gz "https://dl.influxdata.com/telegraf/releases/telegraf-$${TELEGRAF_VERSION}_linux_amd64.tar.gz"
      - tar -xzf /tmp/telegraf.tar.gz -C /tmp/telegraf-extract
      - find /tmp/telegraf-extract -executable -type f -name telegraf -exec cp {} /tmp/telegraf \;
      - mkdir -p dist/linux_amd64/brautomat-telegraf-gui_${CI_COMMIT_TAG}/bin
      - cp build/bin/brautomat-telegraf-gui dist/linux_amd64/brautomat-telegraf-gui_${CI_COMMIT_TAG}/
      - cp /tmp/telegraf                    dist/linux_amd64/brautomat-telegraf-gui_${CI_COMMIT_TAG}/bin/telegraf
      - cp README.md                        dist/linux_amd64/brautomat-telegraf-gui_${CI_COMMIT_TAG}/ || true
      - tar -czf dist/brautomat-telegraf-gui_${CI_COMMIT_TAG}_linux_amd64.tar.gz -C dist/linux_amd64 brautomat-telegraf-gui_${CI_COMMIT_TAG}
      - ls -lahR .

