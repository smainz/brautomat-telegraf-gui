# Build-Pipeline für Woodpecker CI.
#
# Läuft bei jedem Push und prüft, dass sich die App für die zwei
# Zielplattformen Linux amd und WIndows amd bauen lässt. Ein
# Cross-Compiling für macOS/darwin ist nicht möglich, deshalb wird das
# noch nicht umgesetzt, bis wails diese Möglichkeit bietet.
#
# Für echte, veröffentlichte Binaries siehe release.yaml.

when:
  - event: push

steps:
  build:
    image: golang:1.25-bookworm
    environment:
      TELEGRAF_VERSION: "1.39.1"
      CI_COMMIT_TAG: "dev"
    commands:
      # GTK/WebKitGTK-Entwicklungspakete für den Wails-Linux-Webview-Backend.
      - apt-get update
      - apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.0-dev
      - go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - go mod tidy
      - wails build -platform linux/amd64 -clean
      - wails build -platform windows/amd64 -windowsconsole
      # Cross Compiling vor Darwin is not supported in wails v2
      # - wails build -platform darwin/universal
      #
      # Reine Zusatzprüfung: der Mock-Server ist reines Go ohne cgo und
      # lässt sich daher problemlos von hier aus für alle drei
      # Zielplattformen cross-kompilieren - kostet fast nichts und
      # deckt tools/mock-server mit ab.
      - GOOS=linux   GOARCH=amd64 go build -o /tmp/mock-server-linux   ./tools/mock-server
      - GOOS=windows GOARCH=amd64 go build -o /tmp/mock-server-win.exe ./tools/mock-server
      - GOOS=darwin  GOARCH=amd64 go build -o /tmp/mock-server-darwin ./tools/mock-server