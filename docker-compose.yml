# Docker Compose für lokale Test-Datenbanken (Postgres + MariaDB + InfluxDB)
# sowie Grafana zur Visualisierung.
#
# Nur zum manuellen Testen der MQTT-, Postgres-/MySQL- und InfluxDB-Ziele
# gedacht - keine Produktionskonfiguration.
#
# Zugangsdaten sind bewusst simpel und # entsprechen den Vorbelegungen
# im Formular (Datenbank/Benutzer "brautomat", InfluxDB-Bucket "brautomat"),
# damit man in der GUI möglichst wenig von Hand eintragen muss. Für
# InfluxDB sind Org/Bucket/Token bereits vorbelegt (siehe
# DOCKER_INFLUXDB_INIT_*) und müssen im Formular nur noch übernommen werden.
# Der MQTT-Server erfordert keine Zugangsdaten
#
# Grafana (Login brautomat/brautomat, siehe GF_SECURITY_ADMIN_*) bringt
# PostgreSQL, MySQL und InfluxDB bereits als vorkonfigurierte Datasources
# mit (Provisioning-Datei: docker/grafana/provisioning/datasources/datasources.yml,
# passend zu den Zugangsdaten der jeweiligen Service-Definition oben) -
# nach dem Login unter "Connections" direkt nutzbar, kein manuelles
# Einrichten nötig.
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Stop + Daten löschen: docker compose down --volumes
#
# Daten liegen in anonymen Volumes (kein Name vergeben) - die bleiben
# über "docker compose down" hinweg erhalten, werden aber nicht
# automatisch wiederverwendet, falls die Container neu erstellt werden
# (z.B. bei "docker compose up --force-recreate"). Für dauerhafte
# Testdaten stattdessen benannte Volumes verwenden.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: brautomat
      POSTGRES_USER: brautomat
      POSTGRES_PASSWORD: brautomat
    ports:
      - "5432:5432"
    volumes:
      - /var/lib/postgresql/data

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: brautomat
      MARIADB_USER: brautomat
      MARIADB_PASSWORD: brautomat
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - /var/lib/mysql

  influxdb:
    image: influxdb:2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: brautomat
      DOCKER_INFLUXDB_INIT_PASSWORD: brautomat
      DOCKER_INFLUXDB_INIT_ORG: brautomat
      DOCKER_INFLUXDB_INIT_BUCKET: brautomat
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: brautomat-token
    ports:
      - "8086:8086"
    volumes:
      - /var/lib/influxdb2

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - 1883:1883
      # - 8883:8883
      # - 9001:9001
    volumes:
      - /mosquitto/config
      - /mosquitto/data
      - /mosquitto/log

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: brautomat
      GF_SECURITY_ADMIN_PASSWORD: brautomat
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - /var/lib/grafana
    depends_on:
      - postgres
      - mariadb
      - influxdb